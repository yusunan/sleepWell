<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>睡了么 — 加速模式中登玩家睡眠分析</title>
    <meta name="description" content="分析 Dota2 加速模式玩家的睡眠质量。">
    <link rel="stylesheet" href="css/style.css?v=3">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <button class="sidebar-toggle" id="sidebar-toggle" aria-label="菜单">☰</button>
            <div class="site-title">
                <span class="logo-icon">😴</span>
                <span>睡了么</span>
            </div>
            <div class="header-right">
                <div id="rate-limit-indicator"></div>
            </div>
        </div>
    </header>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Layout -->
    <div class="app-layout">
        <!-- Sidebar: Player List -->
        <aside class="sidebar" id="sidebar">
            <div id="player-list"></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Search Section -->
            <section id="search-section" class="search-section">
                <h2>昨晚你睡好了吗？</h2>
                <p class="subtitle">输入 Steam32 ID，根据你的游戏记录评估睡眠质量</p>
                <form id="search-form" class="search-form">
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="search-input"
                            class="search-input"
                            placeholder="输入 Steam32 ID，例如 123456789"
                            inputmode="numeric"
                            autocomplete="off"
                        >
                    </div>
                    <button type="submit" class="btn btn-search">🔍 查询</button>
                </form>
                <p class="help-text">
                    每晚 20:00 ~ 次日 02:00 的游戏记录将被纳入睡眠评估
                </p>
            </section>

            <!-- Dashboard -->
            <div id="dashboard" class="dashboard">
                <!-- Current Session Advice (real-time during 20:00-02:00) -->
                <div id="session-advice-section" class="section"></div>

                <!-- Sleep Evaluation -->
                <div id="sleep-section" class="section"></div>

                <!-- Player Profile -->
                <div id="profile-section" class="section"></div>

                <!-- Patch Filter -->
                <div id="patch-selector-section" class="section"></div>

                <!-- Turbo Summary -->
                <div id="summary-section" class="section"></div>

                <!-- Charts -->
                <div id="charts-section" class="section" style="display:none;"></div>

                <!-- Recent Matches -->
                <div class="section">
                    <h3 class="section-title">最近比赛（加速模式）</h3>
                    <div id="matches-section"></div>
                </div>

                <!-- Recent Peers -->
                <div class="section" id="peers-section" style="display:none;">
                    <h3 class="section-title">最近90天经常排到的玩家</h3>
                    <div id="peers-table-section"></div>
                </div>

                <!-- Hero Performance -->
                <div class="section">
                    <h3 class="section-title">英雄表现（加速模式）</h3>
                    <div id="hero-table-section"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <p>
            睡了么 v2.0 &nbsp;|&nbsp; 评分维度：最后游戏时间 · 胜负 · KDA &nbsp;|&nbsp;
            数据来源：<a href="https://www.opendota.com/" target="_blank" rel="noopener">OpenDota API</a> &nbsp;|&nbsp;
            非官方工具，与 Valve 无关
        </p>
    </footer>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <!-- Version check: detects new deploys even when index.html is cached -->
    <script>
    (function(){var k='dd2_app_version';try{var x=new XMLHttpRequest();
    x.open('GET','/version.txt?_='+Date.now(),false);x.timeout=3000;
    x.send();if(x.status===200){var sv=(x.responseText||'').trim();
    var cv=localStorage.getItem(k);
    if(cv&&sv&&cv!==sv){localStorage.setItem(k,sv);
    var keys=Object.keys(localStorage).filter(function(kk){return kk.indexOf('dd2_')===0;});
    keys.forEach(function(kk){if(kk!=='dd2_player_list')localStorage.removeItem(kk);});
    location.reload(true);return;}
    if(sv)localStorage.setItem(k,sv);}}catch(e){}})();
    </script>

    <script type="module">
        import { init } from './js/app.js?v=3';
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
