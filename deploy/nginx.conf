# ============================================================
# Nginx configuration for 睡了么 API (Alibaba Cloud ECS)
# ============================================================
# Place at: /etc/nginx/sites-available/sleepwell-api
# Then: ln -s /etc/nginx/sites-available/sleepwell-api /etc/nginx/sites-enabled/
# Test:  nginx -t
# Apply: systemctl reload nginx
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_global:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;

# Upstream to Node.js
upstream sleepwell_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name api.your-domain.com;   # <-- CHANGE to your domain

    # Redirect HTTP to HTTPS (after SSL cert is set up)
    # return 301 https://$host$request_uri;

    # ---- Or with SSL (after certbot) ----
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/api.your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request size limit
    client_max_body_size 4k;

    # Access logs
    access_log /var/log/nginx/sleepwell-api-access.log;
    error_log  /var/log/nginx/sleepwell-api-error.log;

    location / {
        # Global rate limit
        limit_req zone=api_global burst=20 nodelay;

        # Stricter auth rate limit
        location /api/auth/login {
            limit_req zone=api_auth burst=5 nodelay;
            proxy_pass http://sleepwell_api;
        }
        location /api/auth/register {
            limit_req zone=api_auth burst=3 nodelay;
            proxy_pass http://sleepwell_api;
        }

        proxy_pass http://sleepwell_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering off;
    }

    # Health check (no rate limit)
    location /api/health {
        limit_req zone=api_global burst=5 nodelay;
        proxy_pass http://sleepwell_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
